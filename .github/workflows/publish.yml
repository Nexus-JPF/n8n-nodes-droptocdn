# Publishes n8n-nodes-droptocdn to npm with provenance (public repo required).
#
# npm Trusted Publisher (recommended):
#   npmjs.com → n8n-nodes-droptocdn → Settings → Trusted Publishers
#   Owner: Nexus-JPF, Repo: n8n-nodes-droptocdn, Workflow: publish.yml
#
# Or GitHub secret NPM_TOKEN (granular token, Read and write, Bypass 2FA).
#
# Release: git tag v0.1.1 && git push origin v0.1.1

name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish n8n-nodes-droptocdn to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and build
        run: |
          npm run lint
          npm run build

      - name: Publish to npm
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
